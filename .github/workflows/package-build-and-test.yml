name: Build and Test Packages

on:
  push:
    branches: [master, develop]
    paths:
      - 'socratic-core/**'
      - 'socrates-cli/**'
      - 'socrates-api/**'
      - '.github/workflows/package-build-and-test.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'socratic-core/**'
      - 'socrates-cli/**'
      - 'socrates-api/**'

jobs:
  test-core:
    name: Test socratic-core
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install socratic-core (editable)
        run: |
          python -m pip install --upgrade pip
          cd socratic-core
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          cd socratic-core
          pip install ruff
          ruff check src/socratic_core || true

      - name: Run tests with coverage
        run: |
          cd socratic-core
          pytest tests/ -v --cov=socratic_core --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./socratic-core/coverage.xml
          fail_ci_if_error: false

  test-cli:
    name: Test socrates-cli
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install socratic-core
        run: |
          python -m pip install --upgrade pip
          cd socratic-core
          pip install -e .

      - name: Install socrates-cli (editable)
        run: |
          cd socrates-cli
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd socrates-cli
          pytest tests/ -v --tb=short || true

  test-api:
    name: Test socrates-api
    runs-on: ubuntu-latest
    needs: test-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install socratic-core
        run: |
          python -m pip install --upgrade pip
          cd socratic-core
          pip install -e .

      - name: Install main Socrates
        run: |
          cd .
          pip install -e .

      - name: Install socrates-api (editable)
        run: |
          cd socrates-api
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd socrates-api
          pytest tests/ -v --tb=short || true

  build-packages:
    name: Build Distributions
    runs-on: ubuntu-latest
    needs: [test-core, test-cli, test-api]

    strategy:
      matrix:
        package:
          - name: socratic-core
            path: socratic-core
          - name: socrates-cli
            path: socrates-cli
          - name: socrates-api
            path: socrates-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build ${{ matrix.package.name }}
        run: |
          cd ${{ matrix.package.path }}
          python -m build

      - name: Check distribution with twine
        run: |
          cd ${{ matrix.package.path }}
          twine check dist/* || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/dist/
          retention-days: 30
