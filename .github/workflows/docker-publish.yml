name: Docker Build and Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nireus79/socrates/api
            docker.io/nireus79/socrates-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nireus79/socrates/frontend
            docker.io/nireus79/socrates-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./socrates-frontend
          file: ./socrates-frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-images:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    if: github.event_name != 'pull_request'
    env:
      SHA_SHORT: ${{ github.sha | truncate(7, '') }}

    steps:
      - run: docker pull nireus79/socrates-api:sha-$SHA_SHORT
      - run: docker pull nireus79/socrates-frontend:sha-$SHA_SHORT
      - run: docker tag nireus79/socrates-api:sha-$SHA_SHORT socrates-api:test
      - run: docker tag nireus79/socrates-frontend:sha-$SHA_SHORT socrates-frontend:test
      - run: docker run --rm socrates-api:test python -c "import sys; print('API image OK')"
      - run: docker run --rm socrates-frontend:test test -f /etc/nginx/conf.d/default.conf && echo "Frontend image OK"

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend, test-images]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Images

            **API:** `nireus79/socrates-api:${{ github.ref_name }}`
            **Frontend:** `nireus79/socrates-frontend:${{ github.ref_name }}`

            Both images tested and pushed to Docker Hub.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
