name: Docker Build and Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: true
        default: 'false'

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nireus79/socrates/api
            docker.io/nireus79/socrates-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/nireus79/socrates/frontend
            docker.io/nireus79/socrates-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./socrates-frontend
          file: ./socrates-frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-images:
    name: Test Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-api, build-frontend]
    if: github.event_name != 'pull_request'
    env:
      SHA_SHORT: ${{ github.sha | truncate(7, '') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test API image
        run: |
          docker pull nireus79/socrates-api:sha-$SHA_SHORT
          docker tag nireus79/socrates-api:sha-$SHA_SHORT socrates-api:test

      - name: Test Frontend image
        run: |
          docker pull nireus79/socrates-frontend:sha-$SHA_SHORT
          docker tag nireus79/socrates-frontend:sha-$SHA_SHORT socrates-frontend:test

      - name: Start API container
        run: |
          docker run -d --name api-test \
            -e DATABASE_URL="sqlite+aiosqlite:///:memory:" \
            -e ANTHROPIC_API_KEY="test" \
            -p 8000:8000 \
            socrates-api:test
          echo "API container started, waiting for health check..."
          sleep 10
          docker logs api-test

      - name: Test API health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health 2>/dev/null; then
              echo "✓ API is healthy"
              exit 0
            fi
            echo "Attempt $i: Waiting for API..."
            sleep 2
          done
          echo "✗ API failed to respond"
          docker logs api-test
          exit 1

      - name: Start Frontend container
        run: |
          docker run -d --name frontend-test -p 3000:80 socrates-frontend:test
          echo "Frontend container started, waiting..."
          sleep 5
          docker logs frontend-test

      - name: Test Frontend loads
        run: |
          for i in {1..20}; do
            if curl -f http://localhost:3000/ 2>/dev/null; then
              echo "✓ Frontend is running"
              exit 0
            fi
            echo "Attempt $i: Waiting for Frontend..."
            sleep 1
          done
          echo "✗ Frontend failed to respond"
          docker logs frontend-test
          exit 1

      - name: Show all logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker logs api-test || true
          echo "=== Frontend Logs ==="
          docker logs frontend-test || true

  publish-release:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend, test-images]
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Docker Images

            ### API
            ```
            nireus79/socrates-api:${{ github.ref_name }}
            ghcr.io/nireus79/socrates/api:${{ github.ref_name }}
            ```

            ### Frontend
            ```
            nireus79/socrates-frontend:${{ github.ref_name }}
            ghcr.io/nireus79/socrates/frontend:${{ github.ref_name }}
            ```

            ## Pull Images

            ```bash
            docker pull nireus79/socrates-api:${{ github.ref_name }}
            docker pull nireus79/socrates-frontend:${{ github.ref_name }}
            ```

            ## Run with Docker Compose

            ```yaml
            version: '3.8'
            services:
              api:
                image: nireus79/socrates-api:${{ github.ref_name }}
                ports:
                  - "8000:8000"
                environment:
                  - DATABASE_URL=sqlite+aiosqlite:///:memory:
                  - ANTHROPIC_API_KEY=your_key_here

              frontend:
                image: nireus79/socrates-frontend:${{ github.ref_name }}
                ports:
                  - "3000:80"
                depends_on:
                  - api
            ```

            ## Tests Passed
            - ✓ API health check
            - ✓ Frontend loads
            - ✓ Images built and pushed
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
