name: CI - Tests and Quality Checks

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install packages in dependency order (local first)
          pip install -e socratic-core
          # Main platform (required by socrates-api)
          pip install -e .
          # CLI and API (depend on socratic-core)
          pip install -e socrates-cli
          pip install -e socrates-api
          # Testing dependencies
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 socratic-core/src socrates-cli/src socrates-api/src || true

      - name: Run unit tests
        timeout-minutes: 30
        run: |
          # Test socratic-core with timeout to prevent hangs on Python 3.8/3.9
          pytest socratic-core/tests/ -v --cov=socratic_core --cov-report=xml --timeout=10 || true
          # Test socrates-cli
          pytest socrates-cli/tests/ -v --tb=short --timeout=10 || true
          # Test socrates-api
          pytest socrates-api/tests/ -v --tb=short --timeout=10 || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run security checks
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          bandit -r socratic-core/src socrates-cli/src socrates-api/src || true
          safety check || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build packages
        run: |
          cd socratic-core && python -m build && cd ..
          cd socrates-cli && python -m build && cd ..
          cd socrates-api && python -m build && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: python-packages
          path: |
            socratic-core/dist/
            socrates-cli/dist/
            socrates-api/dist/
