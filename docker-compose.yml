services:
  # API backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: socrates-api
    environment:
      # Listen on 0.0.0.0 for Docker networking
      SOCRATES_API_HOST: 0.0.0.0
      SOCRATES_API_PORT: 8000
      ENVIRONMENT: production
      # Redis connection for Docker (use service name on docker network)
      REDIS_URL: redis://redis:6379
      # Data persistence: mount volume for SQLite database
      SOCRATES_DATA_DIR: /app/data
      # Add your encryption key here or pass via environment
      # SOCRATES_ENCRYPTION_KEY: your-key-here
    ports:
      - "8000:8000"
    networks:
      - socrates-network
    volumes:
      - socrates_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: socrates-redis
    ports:
      - "6379:6379"
    networks:
      - socrates-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

  # Frontend service - builds and serves the React/Vue application
  frontend:
    build:
      context: ./socrates-frontend
      dockerfile: Dockerfile
      args:
        # API URL available at /api via nginx proxy
        VITE_API_URL: /api
    container_name: socrates-frontend
    ports:
      - "3000:80"
    networks:
      - socrates-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy - routes requests to api and frontend
  nginx:
    image: nginx:1.27-alpine
    container_name: socrates-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - socrates-network
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  socrates-network:
    driver: bridge

volumes:
  socrates_data:
    driver: local
  redis_data:
    driver: local
