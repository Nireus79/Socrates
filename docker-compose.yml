services:
  # API backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: socrates-api
    environment:
      # Listen on 0.0.0.0 for Docker networking
      SOCRATES_API_HOST: 0.0.0.0
      SOCRATES_API_PORT: 8000
      ENVIRONMENT: production
      # Redis connection for Docker (use service name on docker network)
      REDIS_URL: redis://redis:6379
      # Logging configuration
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: 1
      # PYTHONPATH: Ensure Python finds all modules
      PYTHONPATH: /app:/app/socrates-api/src:/app/socrates-cli/src
      # Data persistence: mount volume for SQLite database
      SOCRATES_DATA_DIR: /app/data
      # JWT Configuration - CRITICAL for session persistence across container restarts
      # Must be provided via environment variables (see setup-secrets.sh)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      # API Security
      ALLOWED_HOSTS: localhost,127.0.0.1,api,host.docker.internal
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://api:3000
      # Security - ENCRYPTION KEYS (REQUIRED for API key security)
      # Generate with: ./setup-secrets.sh
      # Pass with: docker-compose --env-file .env.local up --build
      SOCRATES_ENCRYPTION_KEY: ${SOCRATES_ENCRYPTION_KEY}
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY}
    ports:
      - "8000:8000"
    networks:
      - socrates-network
    volumes:
      - socrates_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: socrates-redis
    ports:
      - "6379:6379"
    networks:
      - socrates-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data

  # Frontend service - builds and serves the React/Vue application
  frontend:
    build:
      context: ./socrates-frontend
      dockerfile: Dockerfile
      args:
        # API URL available at /api via nginx proxy
        VITE_API_URL: /api
    container_name: socrates-frontend
    ports:
      - "3000:80"
    networks:
      - socrates-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy - routes requests to api and frontend
  nginx:
    image: nginx:1.27-alpine
    container_name: socrates-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - socrates-network
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  socrates-network:
    driver: bridge

volumes:
  socrates_data:
    driver: local
  redis_data:
    driver: local
